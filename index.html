<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intérprete de Lenguaje de Señas</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <script type="module">
        import {
            FilesetResolver,
            HandLandmarker,
            PoseLandmarker,
            DrawingUtils
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

        window.FilesetResolver = FilesetResolver;
        window.HandLandmarker = HandLandmarker;
        window.PoseLandmarker = PoseLandmarker;
        window.DrawingUtils = DrawingUtils;
    </script>
</head>

<body>

    <div class="app">

        <header class="appHeader">
            <div class="appHeaderLeft">
                <h1>Intérprete de Lenguaje de Señas</h1>
                <p class="appSubtitle">Reconocimiento en tiempo real</p>
            </div>
            <div style="display:flex;gap:8px">
                <button class="settingsBtn" id="fullscreenBtn" title="Pantalla completa">⛶</button>
                <button class="settingsBtn" title="Configuración">⚙</button>
            </div>
        </header>

        <div class="mainLayout">

            <!-- Left: camera -->
            <section class="cameraPanel">
                <div class="cameraPanelHeader">
                    <span class="cameraPanelLabel">Vista de Cámara</span>
                    <button id="speakBtn" class="speakBtn">
                        <span class="speakIcon">🔊</span> Speak
                    </button>
                </div>
                <div class="cameraWrapper">
                    <video id="video" autoplay playsinline muted></video>
                    <canvas id="overlay"></canvas>
                </div>
            </section>

            <!-- Right: prediction + history -->
            <aside class="sidePanel">

                <section class="interpretationSection">
                    <div class="sectionHeader">
                        <h2 class="sectionTitle">Interpretación</h2>
                        <button class="iconBtn" id="speakIconBtn" title="Escuchar">🔊</button>
                    </div>
                    <div class="predictionBox">
                        <span id="predictionText" class="predictionText">Esperando...</span>
                    </div>
                    <div class="confidenceRow">
                        <span class="confidenceLabel">Precisión</span>
                        <div class="confidenceBarWrap">
                            <div class="confidenceBar" id="confidenceBar"></div>
                        </div>
                        <span class="confidenceValue" id="confidenceText">0%</span>
                        <button class="iconBtn" id="clearBtn" title="Limpiar historial">🗑</button>
                    </div>
                </section>

                <section class="historySection">
                    <h2 class="sectionTitle">Historial</h2>
                    <ul id="historyList"></ul>
                </section>

            </aside>

        </div>

    </div>

    <!-- Ambiguity modal -->
    <div id="ambiguityOverlay" class="ambiguityOverlay hidden">
        <div class="ambiguityModal">
            <p class="ambiguityQuestion">¿Cuál seña quisiste decir?</p>
            <div class="ambiguityOptions">
                <button id="ambiguityBtn0" class="ambiguityBtn"></button>
                <button id="ambiguityBtn1" class="ambiguityBtn"></button>
            </div>
            <button id="ambiguityDismiss" class="ambiguityDismiss">Cancelar</button>
        </div>
    </div>

    <script src="app.js?v=16"></script>

</body>

</html>
